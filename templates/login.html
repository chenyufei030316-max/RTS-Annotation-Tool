<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTS Annotator · Sign In</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0d1117;
  color: #e6edf3;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(48,54,61,0.4) 1px, transparent 1px),
    linear-gradient(90deg, rgba(48,54,61,0.4) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
.card {
  position: relative;
  width: 380px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 36px 32px 32px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #238636, #3fb950);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text { font-size: 15px; font-weight: 700; color: #e6edf3; }
.logo-sub  { font-size: 11px; color: #8b949e; margin-top: 1px; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.subtitle { font-size: 13px; color: #8b949e; margin-bottom: 28px; }
.field { margin-bottom: 16px; }
label {
  display: block;
  font-size: 11px; font-weight: 600; color: #8b949e;
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
}
.optional { color: #484f58; font-weight: 400; text-transform: none; letter-spacing: 0; margin-left: 4px; }
input[type=email], input[type=text] {
  width: 100%;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 8px;
  color: #e6edf3;
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
input[type=email]:focus, input[type=text]:focus {
  border-color: #388bfd;
  box-shadow: 0 0 0 3px rgba(56,139,253,0.15);
}
.btn-submit {
  width: 100%; margin-top: 8px; padding: 11px;
  background: linear-gradient(180deg, #2ea043, #238636);
  border: 1px solid rgba(240,246,252,0.1);
  border-radius: 8px;
  color: #fff; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: filter 0.15s;
}
.btn-submit:hover { filter: brightness(1.1); }
.btn-submit:active { filter: brightness(0.95); }
.error {
  background: rgba(218,54,51,0.12);
  border: 1px solid rgba(218,54,51,0.4);
  border-radius: 8px;
  color: #f85149; font-size: 13px;
  padding: 10px 14px; margin-bottom: 18px;
}
.footer { margin-top: 24px; text-align: center; font-size: 12px; color: #484f58; }
.tag {
  position: absolute; top: -1px; right: 20px;
  background: #1f6feb; color: #e6edf3;
  font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
  padding: 3px 10px; border-radius: 0 0 6px 6px;
}
</style>
</head>
<body>
<div class="card">
  <div class="tag">INTERNAL</div>
  <div class="logo">
    <div class="logo-icon">🛰</div>
    <div>
      <div class="logo-text">RTS Annotator</div>
      <div class="logo-sub">Retrogressive Thaw Slump · SAM2</div>
    </div>
  </div>

  <h1>Sign in</h1>
  <p class="subtitle">Enter your authorized email to continue</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" autofocus autocomplete="email" required>
    </div>
    <div class="field">
      <label>Display name <span class="optional">· optional</span></label>
      <input type="text" name="name" placeholder="Your name">
    </div>
    <button type="submit" class="btn-submit">Sign in →</button>
  </form>

  <div class="footer">Arctic permafrost mapping · Internal tool</div>
</div>
</body>
</html>
